<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>말하는 고구마 답답이!</title>
  <style>
    body {
      background-color: #ffd861;
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .header {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }
    .header img {
      width: 150px;
      height: auto;
    }

    .content {
      display: none;
      margin-top: 200px;
    }
    .content.active {
      display: block;
    }

    h1, h2 { margin: 20px 0; }
    .button, .option, .home {
      display: block;
      margin: 20px auto;
      padding: 20px 40px;
      background-color: #ff9800;
      color: #fff;
      font-size: 1.4em;
      font-weight: bold;
      text-decoration: none;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      width: 80%;
    }
    .button:hover, .option:hover, .home:hover { background-color: #e68900; }

    .result-box {
      margin: 30px auto;
      width: 90%;
      max-width: 500px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .result-top {
      background-color: #8b1c1c;
      color: #fff;
      padding: 25px;
      font-size: 1.6em;
      font-weight: bold;
    }
    .result-bottom {
      background-color: #ffd861;
      color: #333;
      padding: 25px;
      font-size: 1.3em;
    }

    @media (max-width: 600px) {
      h1, h2 { font-size: 1.4em; }
      .button, .option, .home {
        width: 90%;
        font-size: 1.2em;
        padding: 18px 30px;
      }
      .header img {
        width: 120px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="고구마.png" alt="고구마 캐릭터">
  </div>

  <div class="content active" id="content1">
    <h1>말하는 고구마 답답이!</h1>
    <p>알려주는 고구마</p>
    <button class="button" onclick="goToContent('content2')">알려줘 답답아!</button>
  </div>

  <div class="content" id="content2">
    <h2>좋아! 오늘은 어떤 얘기 해볼까?</h2>
    <button class="option" onclick="showMeal()">식사 메뉴!</button>
    <button class="option" onclick="showCheer()">나 고민이 많아...ㅠㅠ</button>
    <button class="option" onclick="showDecision()">할까? 말까?</button>
    <button class="home" onclick="goHome()">처음으로</button>
  </div>

  <div class="content" id="content3">
    <div class="result-box">
      <div class="result-top" id="resultTop">결과</div>
      <div class="result-bottom" id="resultBottom">여기에 출력됩니다</div>
    </div>
    <button class="home" onclick="goHome()">처음으로</button>
  </div>

  <script>
    function goToContent(nextId) {
      const current = document.querySelector('.content.active');
      const next = document.getElementById(nextId);
      current.classList.remove('active');
      next.classList.add('active');
    }

    function goHome() {
      const current = document.querySelector('.content.active');
      const home = document.getElementById('content1');
      current.classList.remove('active');
      home.classList.add('active');
    }

    const meals = ["김치찌개","된장찌개","불고기","비빔밥","칼국수",
      "삼겹살","치킨","떡볶이","라면","제육볶음",
      "갈비탕","순두부찌개","쌈밥","부대찌개","냉면",
      "돈까스","오므라이스","짜장면","짬뽕","볶음밥"];
    const cheers = ["넌 할 수 있어!","포기하지 마!","오늘도 멋지다!",
      "힘내! 잘 하고 있어!","네가 최고야!","걱정하지 마, 잘 될 거야!",
      "조금만 더 버티자!","네 노력은 빛날 거야!","자신감을 가져!","괜찮아, 다 잘 될 거야!"];

    function showMeal() {
      const choice = meals[Math.floor(Math.random() * meals.length)];
      goToContent('content3');
      document.getElementById('resultTop').innerText = "오늘 메뉴 추천!";
      document.getElementById('resultBottom').innerText = "오늘은 " + choice + " 어때?";
    }

    function showCheer() {
      const choice = cheers[Math.floor(Math.random() * cheers.length)];
      goToContent('content3');
      document.getElementById('resultTop').innerText = "응원 메시지!";
      document.getElementById('resultBottom').innerText = choice;
    }

    function showDecision() {
      const choice = Math.random() < 0.5 ? "좋아! 하자!" : "하지마!";
      goToContent('content3');
      document.getElementById('resultTop').innerText = choice;
      document.getElementById('resultBottom').innerText = choice === "좋아! 하자!" ? "안하면 후회될걸?" : "조금 더 기다려봐!";
    }
  </script>
</body>
</html>
